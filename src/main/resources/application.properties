spring.application.name=chunks

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

vne.s3Config.access.key.id=${ACCESS_KEYID}
vne.s3Config.secret.key.access=${SECRETKEY_ACCESS}
vne.s3Config.bucket.name=${AWS_BUCKET}
vne.s3Config.base.url=${AWS_BASE_URL}
vne.s3Config.CLOUDFRONT.url=${AWS_CLOUDFRONT_URL}

spring.datasource.url=jdbc:postgresql://localhost:5432/uploads
spring.datasource.username=postgres
spring.datasource.password=1234
spring.jpa.hibernate.ddl-auto=update